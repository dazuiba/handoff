# handoff default configuration
# Do NOT edit this file — create ~/.handoff/config.yaml to override.
#
# Structure:
#   type_defaults.<type>   — how a backend type is launched (CLI, flags, env, PTY).
#                            High-level users can override an entire type.
#   backends.<name>        — a concrete backend instance (endpoint, token, model).
#
# Resolution for a backend:  type_defaults[<type>] -> backends.<name> -> user config.
# Deep-merge for mappings; lists are replaced wholesale (not concatenated).

default_backend: deepseek

# System prompt appended to every claude invocation (claude-type backends only).
system_prompt: |
  重要：你收到的是一个完整需求，必须直接执行到底。禁止以下行为：
  1. 不要分析完问题后问用户"要开始改吗？""倾向于哪个方案？"等确认
  2. 不要提出多个方案让用户选择
  3. 不要输出分析报告后停下来等指示
  你需要：理解需求 → 直接修改代码 → 输出结果。需求模糊时按最合理的默认方式执行，不要问。

# ── type-level defaults: how each backend type is launched ──────────────────────
type_defaults:
  # claude type: run `claude -p ... --output-format stream-json` against any
  # anthropic-compatible endpoint. Needs a PTY wrapper (script) because `claude -p`
  # behaves differently when stdout is not a TTY.
  claude:
    command: "claude"
    pty:
      - "script"
      - "-q"
      - "/dev/null"
    env:
      ANTHROPIC_MODEL: "{model}"
      CLAUDE_CONFIG_DIR: "{home}/.claude"
      ANTHROPIC_DEFAULT_OPUS_MODEL: "{pro_model}"
      ANTHROPIC_DEFAULT_SONNET_MODEL: "{model}"
      ANTHROPIC_DEFAULT_HAIKU_MODEL: "{model}"
      CLAUDE_CODE_SUBAGENT_MODEL: "{model}"
    session_flags:
      - "-p"
      - "{prompt}"
      - "--dangerously-skip-permissions"
      - "--append-system-prompt"
      - "{system_prompt}"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--include-partial-messages"
    session_id_flags:
      - "--session-id"
      - "{session_id}"
    # Used by `resume <seq> <prompt>` (non-interactive continuation): append a new
    # turn to an existing claude session in print mode. Combined with session_flags
    # (which carry -p/{prompt}/stream-json/etc.) this becomes `claude -p ... --resume <id>`.
    continue_id_flags:
      - "--resume"
      - "{session_id}"
    resume_flags:
      - "--resume"
      - "{session_id}"
      - "--dangerously-skip-permissions"

  # codex type: run `codex exec --json` against the local codex login state.
  # No PTY needed (codex exec emits clean JSONL to a pipe). No ANTHROPIC_* env.
  codex:
    command: "codex"
    pty: []
    env: {}
    # Fresh run: codex exec --json <flags> {prompt}
    session_flags:
      - "exec"
      - "--json"
      - "--skip-git-repo-check"
      - "--sandbox"
      - "workspace-write"
      - "-m"
      - "{model}"
      - "-C"
      - "{cwd}"
      - "{prompt}"
    # codex has no separate "set session id" mode for a fresh run; the id is
    # assigned by codex and reported in the thread.started event.
    session_id_flags: []
    # Non-interactive continuation: codex exec resume --json <session_id> {prompt}.
    # NOTE: `codex exec resume` does not accept --sandbox/-C; it inherits the
    # original session's settings, so this list deliberately omits them.
    continue_id_flags:
      - "exec"
      - "resume"
      - "--json"
      - "--skip-git-repo-check"
      - "{session_id}"
      - "{prompt}"
    # Interactive reopen: `codex resume <session_id>`.
    resume_flags:
      - "resume"
      - "{session_id}"

# ── backend instances: ready to use out of the box ─────────────────────────────
backends:
  # DeepSeek API via anthropic-compatible endpoint. Needs a token: set it in
  # ~/.handoff/config.yaml or export DEEPSEEK_API_KEY in your environment.
  deepseek:
    type: claude
    description: "DeepSeek API"
    model: deepseek-v4-flash
    pro_model: "deepseek-v4-pro[1m]"
    env:
      ANTHROPIC_BASE_URL: "https://api.deepseek.com/anthropic"
      ANTHROPIC_AUTH_TOKEN: "${DEEPSEEK_API_KEY}"

  # Official Anthropic endpoint + opus model. No env override — uses your local
  # claude login state. Zero config.
  opus:
    type: claude
    description: "Anthropic opus (local claude login)"
    model: claude-opus-4-8
    pro_model: claude-opus-4-8

  # OpenAI codex via the local codex login state. Zero config.
  codex:
    type: codex
    description: "OpenAI codex exec (local codex login)"
    model: gpt-5.5
    pro_model: gpt-5.5
